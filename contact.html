<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Wellness Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        footer { background-color: #212529; color: white; padding: 20px 0; }
                .contact-img { 
            border-radius: 15px; 
            object-fit: cover; 
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">WELLNESS CLINIC</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="services.html">Services</a>
                <a class="nav-link" href="team.html">Our Team</a>
                <a class="nav-link active" href="contact .html">Contact Us</a>
            </div>
        </div>
    </nav>

    <div class="container text-center">
        <img src="images/contact us.avif" width="500" height="500" alt="reception" class="contact-img img-fluid">
    </div>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6 bg-light p-5 rounded shadow-sm border">
                <h2 class="mb-4 text-center">Contact Our Clinic</h2>
                <form>
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="Your Name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="email@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">How can we help you?</label>
                        <textarea class="form-control" rows="4" placeholder="Please describe how we can assist you..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Submit Inquiry</button>
                </form>
            </div>
        </div>
    </div>

    <footer class="text-center py-3 mt-5">
        <div class="container">
            <p>&copy; 2026 Wellness Clinic | Designed by Nermeen Bolous</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
